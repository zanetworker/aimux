repos:
  # Secrets scanning — catches API keys, passwords, tokens before they're committed
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks

  # General hygiene — trailing whitespace, merge conflicts, large files
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']  # block files > 1MB (catches accidental binary commits)
      - id: check-yaml
        args: ['--allow-multiple-documents']  # Kubernetes YAML uses multi-doc
