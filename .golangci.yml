version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck      # finds unchecked errors (e.g., ignoring file.Close() errors)
    - govet         # reports suspicious constructs (same as go vet)
    - ineffassign   # detects assignments to variables that are never used
    - staticcheck   # mega-linter: nil derefs, dead code, deprecated APIs
    - unused        # finds unused variables, functions, types
    - gosec         # security scanner (SQL injection, hardcoded creds, etc.)
    - misspell      # catches typos in comments and strings
    - unconvert     # removes unnecessary type conversions

linters-settings:
  gosec:
    excludes:
      - G104  # allow unhandled errors in deferred Close() calls

issues:
  exclude-dirs:
    - dist
    - runtime
    - testdata
