# Secrets for the k8s-agents system.
# NEVER commit real values — all data fields below are base64-encoded placeholders.
# Replace each placeholder with the correct base64 value before applying:
#   echo -n "your-value" | base64
#
# Or use kubectl to create from literal values (recommended):
#   kubectl create secret generic redis-secret --from-literal=password=YOUR_REDIS_PASSWORD -n agents
#   kubectl create secret generic repo-secret --from-literal=token=ghp_... --from-literal=host=github.com/azaalouk/myrepo.git -n agents
#   kubectl create secret generic llm-keys --from-literal=anthropic=sk-ant-... -n agents

---
# Redis authentication password.
# kubectl create secret generic redis-secret \
#   --from-literal=password=YOUR_REDIS_PASSWORD \
#   -n agents
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: agents
  labels:
    app.kubernetes.io/part-of: k8s-agents
type: Opaque
data:
  # base64 placeholder — replace with: echo -n "YOUR_REDIS_PASSWORD" | base64
  password: REPLACE_WITH_BASE64_REDIS_PASSWORD

---
# GitHub token for git clone (init container) and branch cleanup (MCP server).
# token: GitHub PAT with repo scope (or fine-grained token scoped to one repo, contents: write)
# host:  github.com/azaalouk/myrepo.git  (no https://, token is prepended at runtime)
#
# kubectl create secret generic repo-secret \
#   --from-literal=token=ghp_YOUR_GITHUB_PAT \
#   --from-literal=host=github.com/azaalouk/myrepo.git \
#   -n agents
apiVersion: v1
kind: Secret
metadata:
  name: repo-secret
  namespace: agents
  labels:
    app.kubernetes.io/part-of: k8s-agents
type: Opaque
data:
  # base64 placeholder — replace with: echo -n "ghp_YOUR_GITHUB_PAT" | base64
  token: REPLACE_WITH_BASE64_GITHUB_TOKEN
  # base64 placeholder — replace with: echo -n "github.com/azaalouk/myrepo.git" | base64
  host: REPLACE_WITH_BASE64_GIT_HOST

---
# LLM provider API keys.
# kubectl create secret generic llm-keys \
#   --from-literal=anthropic=sk-ant-YOUR_ANTHROPIC_KEY \
#   -n agents
apiVersion: v1
kind: Secret
metadata:
  name: llm-keys
  namespace: agents
  labels:
    app.kubernetes.io/part-of: k8s-agents
type: Opaque
data:
  # base64 placeholder — replace with: echo -n "sk-ant-YOUR_ANTHROPIC_KEY" | base64
  anthropic: REPLACE_WITH_BASE64_ANTHROPIC_API_KEY
