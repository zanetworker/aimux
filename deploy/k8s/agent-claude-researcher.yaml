# Claude Researcher agent Deployment.
# replicas: 0 — scale-to-zero. spawn_agent MCP tool scales up on demand.
# Results stored in Redis — no git workflow, no workspace volume.
# Uses haiku (cheap, fast) with WebSearch + WebFetch for research tasks.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-claude-researcher
  namespace: agents
  labels:
    app: agent-claude-researcher
    team-component: agent
    provider: claude
    role: researcher
    app.kubernetes.io/part-of: k8s-agents
spec:
  replicas: 0
  selector:
    matchLabels:
      app: agent-claude-researcher
  template:
    metadata:
      labels:
        app: agent-claude-researcher
        team-component: agent
        provider: claude
        role: researcher
        app.kubernetes.io/part-of: k8s-agents
    spec:
      serviceAccountName: mcp-server
      containers:
        - name: agent
          image: quay.io/azaalouk/agent-claude:latest
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379"
            - name: TEAM_ID
              value: "my-team"
            - name: AGENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PROVIDER
              value: "claude"
            - name: ROLE
              value: "researcher"
            - name: MODEL
              value: "claude-haiku-4-5-20251001"
            - name: ALLOWED_TOOLS
              value: "Read,Grep,Glob,WebSearch,WebFetch"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-keys
                  key: anthropic
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
