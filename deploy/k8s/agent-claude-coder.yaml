# Claude Coder agent Deployment.
# replicas: 0 — scale-to-zero by default. The MCP server's spawn_agent tool scales
# this up when Claude needs a coder. Agents are long-lived task loops (not Jobs).
#
# Workspace lifecycle:
#   initContainer (alpine/git): clones repo via HTTPS token auth into emptyDir /workspace
#   main container (agent):     reads/edits code in /workspace, commits and pushes per task
#   Both containers share the workspace emptyDir volume.
#
# Role behaviour is driven entirely by env vars (ROLE, ALLOWED_TOOLS, MODEL).
# Same image (quay.io/azaalouk/agent-claude:latest) is used for all Claude roles.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-claude-coder
  namespace: agents
  labels:
    app: agent-claude-coder
    team-component: agent
    provider: claude
    role: coder
    app.kubernetes.io/part-of: k8s-agents
spec:
  # Scale-to-zero: Claude MCP spawn_agent tool increments replicas to activate.
  replicas: 0
  selector:
    matchLabels:
      app: agent-claude-coder
  template:
    metadata:
      labels:
        app: agent-claude-coder
        team-component: agent
        provider: claude
        role: coder
        app.kubernetes.io/part-of: k8s-agents
    spec:
      serviceAccountName: mcp-server
      initContainers:
        - name: clone-repo
          image: alpine/git
          # HTTPS token auth: token embedded in URL so no SSH key needed.
          # repo-secret holds two keys: token (GitHub PAT) and host (no https:// prefix).
          command:
            - sh
            - -c
            - git clone https://$(GIT_TOKEN)@$(GIT_HOST) /workspace
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: repo-secret
                  key: token
            - name: GIT_HOST
              valueFrom:
                secretKeyRef:
                  name: repo-secret
                  key: host
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: agent
          image: quay.io/azaalouk/agent-claude:latest
          env:
            # REDIS_PASSWORD is resolved first so REDIS_URL can reference it via $(REDIS_PASSWORD).
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379"
            - name: TEAM_ID
              value: "my-team"
            # AGENT_ID is set from the pod name so each replica has a unique identity.
            - name: AGENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PROVIDER
              value: "claude"
            - name: ROLE
              value: "coder"
            - name: MODEL
              value: "claude-opus-4-6"
            # Coders need full read/write/execute tools to implement tasks.
            - name: ALLOWED_TOOLS
              value: "Read,Edit,Write,Bash,Grep,Glob"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-keys
                  key: anthropic
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: repo-secret
                  key: token
            - name: GIT_HOST
              valueFrom:
                secretKeyRef:
                  name: repo-secret
                  key: host
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "3Gi"
              cpu: "2000m"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir:
            sizeLimit: 5Gi
