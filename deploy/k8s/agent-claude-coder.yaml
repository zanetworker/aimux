# Claude Coder agent Deployment.
# replicas: 0 — scale-to-zero. spawn_agent MCP tool scales up on demand.
# Results stored in Redis — no git workflow, no workspace volume.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-claude-coder
  namespace: agents
  labels:
    app: agent-claude-coder
    team-component: agent
    provider: claude
    role: coder
    app.kubernetes.io/part-of: k8s-agents
spec:
  replicas: 0
  selector:
    matchLabels:
      app: agent-claude-coder
  template:
    metadata:
      labels:
        app: agent-claude-coder
        team-component: agent
        provider: claude
        role: coder
        app.kubernetes.io/part-of: k8s-agents
    spec:
      serviceAccountName: mcp-server
      containers:
        - name: agent
          image: quay.io/azaalouk/agent-claude:latest
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379"
            - name: TEAM_ID
              value: "my-team"
            - name: AGENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PROVIDER
              value: "claude"
            - name: ROLE
              value: "coder"
            - name: MODEL
              value: "claude-opus-4-6"
            - name: ALLOWED_TOOLS
              value: "Read,Edit,Write,Bash,Grep,Glob"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-keys
                  key: anthropic
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "3Gi"
              cpu: "2000m"
